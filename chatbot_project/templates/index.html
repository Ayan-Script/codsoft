<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssistAI | Modern Rule-Based Chatbot</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="chat-wrapper">
        <header>
            <div class="bot-avatar">🤖</div>
            <div>
                <h2>AssistAI</h2>
                <p>Rule-Based Intelligent Assistant</p>
            </div>
        </header>

        <div id="chat-box">
            <!-- Messages go here -->
        </div>

        <div class="typing">
            AssistAI is typing <span></span><span></span><span></span>
        </div>

        <div class="suggestions">
            <div class="suggestion-chip" onclick="quickReply('What can you do?')">Help</div>
            <div class="suggestion-chip" onclick="quickReply('Tell me a joke')">Joke</div>
            <div class="suggestion-chip" onclick="quickReply('What time is it?')">Time</div>
            <div class="suggestion-chip" onclick="quickReply('Who made you?')">Creator</div>
        </div>

        <div class="input-container">
            <input type="text" id="user-input" placeholder="Ask me something..." autocomplete="off">
            <button id="send-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
